[package]
name = "agentzero"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Lightweight, Rust-first agent runtime and CLI"
repository = "https://github.com/auser/agentzero"
homepage = "https://github.com/auser/agentzero"
keywords = ["agent", "cli", "ai", "runtime", "llm"]
categories = ["command-line-utilities", "development-tools"]
publish = false
autobins = false

[features]
default = ["memory-sqlite", "plugins", "gateway", "tui", "interactive", "tls-rustls", "document-tools"]
minimal = ["memory-sqlite"]
embedded = ["memory-sqlite", "plugins"]
memory-sqlite = ["agentzero-cli/memory-sqlite"]
memory-sqlite-plain = ["agentzero-cli/memory-sqlite-plain"]
interactive = ["agentzero-cli/interactive"]
memory-turso = ["agentzero-cli/memory-turso"]
rag = ["agentzero-cli/rag"]
hardware = ["agentzero-cli/hardware"]
channels-standard = ["agentzero-cli/channels-standard"]
plugins = ["agentzero-cli/plugins"]
plugin-dev = ["agentzero-cli/plugin-dev"]
gateway = ["agentzero-cli/gateway"]
tui = ["agentzero-cli/tui"]
wasm-jit = ["agentzero-cli/wasm-jit"]
tls-rustls = ["agentzero-cli/tls-rustls"]
tls-native = ["agentzero-cli/tls-native"]
vendored-openssl = ["agentzero-cli/vendored-openssl"]
privacy = ["agentzero-cli/privacy"]
telemetry = ["agentzero-cli/telemetry"]
document-tools = ["agentzero-cli/document-tools"]

[dependencies]
anyhow.workspace = true
agentzero-cli = { workspace = true }
agentzero-core = { workspace = true }
tokio.workspace = true

[[bin]]
name = "agentzero"
path = "bins/cli.rs"
