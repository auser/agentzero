[package]
name = "agentzero"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Lightweight, Rust-first agent runtime and CLI"
repository = "https://github.com/auser/agentzero"
homepage = "https://github.com/auser/agentzero"
keywords = ["agent", "cli", "ai", "runtime", "llm"]
categories = ["command-line-utilities", "development-tools"]
autobins = false

[features]
default = ["memory-sqlite", "plugins", "gateway", "tui", "interactive", "tls-rustls", "document-tools", "tools-full"]
tools-core = ["agentzero-cli/tools-core"]
tools-extended = ["tools-core", "agentzero-cli/tools-extended"]
tools-full = ["tools-extended", "agentzero-cli/tools-full"]
minimal = ["memory-sqlite-plain", "tools-core"]
embedded = ["memory-sqlite-plain", "tools-core"]
embedded-minimal = ["agentzero-cli/embedded-minimal"]
memory-sqlite = ["agentzero-cli/memory-sqlite"]
memory-sqlite-plain = ["agentzero-cli/memory-sqlite-plain"]
interactive = ["agentzero-cli/interactive"]
memory-turso = ["agentzero-cli/memory-turso"]
rag = ["agentzero-cli/rag"]
hardware = ["agentzero-cli/hardware"]
channels-standard = ["agentzero-cli/channels-standard"]
plugins = ["dep:agentzero-plugins", "agentzero-cli/plugins"]
plugin-dev = ["agentzero-cli/plugin-dev"]
gateway = ["dep:agentzero-gateway", "agentzero-cli/gateway"]
tui = ["agentzero-cli/tui"]
wasm-jit = ["agentzero-cli/wasm-jit"]
tls-rustls = ["agentzero-cli/tls-rustls"]
tls-native = ["agentzero-cli/tls-native"]
vendored-openssl = ["agentzero-cli/vendored-openssl"]
privacy = ["agentzero-cli/privacy"]
telemetry = ["agentzero-cli/telemetry"]
document-tools = ["agentzero-cli/document-tools"]
local-model = ["agentzero-cli/local-model"]
config-ui = ["agentzero-cli/config-ui"]

[lib]
name = "agentzero"
path = "src/lib.rs"

[dependencies]
anyhow.workspace = true
agentzero-cli = { workspace = true }
agentzero-core = { workspace = true }
agentzero-config = { workspace = true }
agentzero-providers = { workspace = true }
agentzero-tools = { workspace = true }
agentzero-infra = { workspace = true }
agentzero-orchestrator = { workspace = true }
agentzero-storage = { workspace = true }
agentzero-auth = { workspace = true }
agentzero-channels = { workspace = true }
agentzero-gateway = { workspace = true, optional = true }
agentzero-plugins = { workspace = true, optional = true }
tokio.workspace = true

[[bin]]
name = "agentzero"
path = "bins/cli.rs"
