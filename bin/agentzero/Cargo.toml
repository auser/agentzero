[package]
name = "agentzero"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
autobins = false

[features]
default = ["memory-sqlite"]
memory-sqlite = ["agentzero-cli/memory-sqlite"]
memory-turso = ["agentzero-cli/memory-turso"]
rag = ["agentzero-cli/rag"]
hardware = ["agentzero-cli/hardware"]

[dependencies]
anyhow.workspace = true
agentzero-cli = { workspace = true }
agentzero-security = { workspace = true }
tokio.workspace = true

[[bin]]
name = "agentzero"
path = "bins/cli.rs"
