[advisories]
# Only fail on unmaintained/unsound crates that are direct workspace dependencies.
# Transitive deps (ratatuiâ†’paste, libsqlâ†’rustls-pemfile, ratatuiâ†’lru) are outside
# our direct control and tracked below for upgrade when upstream releases fixes.
unmaintained = "workspace"
unsound = "workspace"
ignore = [
    # Transitive unmaintained/unsound deps are already filtered by the
    # `unmaintained = "workspace"` / `unsound = "workspace"` settings above,
    # so they do NOT need ignore entries here (which would cause
    # "no crate matched advisory criteria" errors in cargo-deny).
    #
    # Known transitive issues tracked for eventual upstream upgrades:
    #   paste 1.0.15 (RUSTSEC-2024-0436) via ratatui
    #   fxhash 0.2.1 (RUSTSEC-2025-0057) via inquire
    #   rustls-pemfile 2.2.0 (RUSTSEC-2025-0134) via libsql
    #   bincode 1.3.3 (RUSTSEC-2025-0141) via libsql
    #   lru 0.12.5 (RUSTSEC-2026-0002) via ratatui
]
