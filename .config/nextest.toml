[profile.default]
# Kill tests that take longer than 30s — prevents hanging
slow-timeout = { period = "30s", terminate-after = 2 }
# Fail on first test timeout rather than waiting for all
fail-fast = true
# Use all available CPUs
test-threads = "num-cpus"

[profile.default.junit]
path = "target/nextest/default/junit.xml"

[profile.ci]
# CI gets a longer leash but still won't hang forever
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = false

# Ollama E2E tests: serialized, long timeout
[[profile.default.overrides]]
filter = "test(ollama)"
threads-required = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 2 }

# Git worktree tests: serialized to avoid .git/index race under parallel nextest
[[profile.default.overrides]]
filter = "test(/sandbox::tests::worktree/) | test(/workspace::tests::(collect_diff|merge_worktree)/)"
threads-required = "num-cpus"
