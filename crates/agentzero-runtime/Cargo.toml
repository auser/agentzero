[package]
name = "agentzero-runtime"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
default = []
memory-turso = ["dep:agentzero-memory-turso"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
agentzero-config = { path = "../agentzero-config" }
agentzero-core = { path = "../agentzero-core" }
agentzero-infra = { path = "../agentzero-infra" }
agentzero-memory-sqlite = { path = "../agentzero-memory-sqlite" }
agentzero-memory-turso = { path = "../agentzero-memory-turso", optional = true }
agentzero-providers = { path = "../agentzero-providers" }
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true

[dev-dependencies]
agentzero-testkit = { path = "../agentzero-testkit" }
temp-env = "0.3"
