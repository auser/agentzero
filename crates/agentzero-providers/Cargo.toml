[package]
name = "agentzero-providers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "LLM provider abstraction layer for AgentZero (Anthropic, OpenAI-compatible)"
repository.workspace = true

[features]
default = []
privacy = ["agentzero-core/privacy"]
local-model = ["dep:llama-cpp-2", "dep:hf-hub", "dep:indicatif", "dep:dirs"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
agentzero-core = { workspace = true }
futures-util.workspace = true
metrics.workspace = true
regex.workspace = true
reqwest = { workspace = true, features = ["stream"] }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
llama-cpp-2 = { workspace = true, features = ["sampler"], optional = true }
hf-hub = { workspace = true, optional = true }
indicatif = { workspace = true, optional = true }
dirs = { version = "5", optional = true }

[dev-dependencies]
base64 = "0.22"
tracing-subscriber = { workspace = true }
