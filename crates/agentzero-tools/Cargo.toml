[package]
name = "agentzero-tools"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description.workspace = true
repository.workspace = true
publish = false

[features]
default = ["document-tools"]
document-tools = ["dep:scraper", "dep:zip"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
agentzero-core = { workspace = true }
agentzero-providers = { workspace = true }
agentzero-storage = { workspace = true }
glob.workspace = true
url.workspace = true
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
base64 = "0.22"
reqwest.workspace = true
scraper = { version = "0.22", optional = true }
zip = { workspace = true, optional = true }

[dev-dependencies]
temp-env = "0.3"
