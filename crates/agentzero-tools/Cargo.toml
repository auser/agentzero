[package]
name = "agentzero-tools"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Tool implementations for AgentZero agents"
repository.workspace = true

[features]
default = ["tools-full", "document-tools"]
tools-core = []
tools-extended = ["tools-core"]
tools-full = ["tools-extended"]
document-tools = ["dep:scraper", "dep:zip"]
rag = ["dep:text-splitter"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
agentzero-core = { workspace = true }
agentzero-macros = { workspace = true }
agentzero-providers = { workspace = true }
agentzero-storage = { workspace = true }
glob.workspace = true
url.workspace = true
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tokio-util.workspace = true
tracing.workspace = true
base64 = "0.22"
reqwest.workspace = true
scraper = { version = "0.22", optional = true }
text-splitter = { workspace = true, optional = true }
zip = { workspace = true, optional = true }

[dev-dependencies]
temp-env = "0.3"
tempfile = "3"
