[package]
name = "agentzero-session"
version = "0.1.0"
description = "Session engine for AgentZero — orchestrates model calls, tool invocation, and policy enforcement"
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["wasm"]
wasm = ["agentzero-sandbox/wasm"]
rag = ["agentzero-index"]

[dependencies]
agentzero-core = { workspace = true }
agentzero-audit = { workspace = true }
agentzero-index = { workspace = true, optional = true }
agentzero-policy = { workspace = true }
agentzero-sandbox = { workspace = true }
agentzero-skills = { workspace = true }
agentzero-tools = { workspace = true }
agentzero-tracing = { workspace = true }
chrono = { workspace = true }
reqwest = { workspace = true, features = ["blocking"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
tempfile = "3"
