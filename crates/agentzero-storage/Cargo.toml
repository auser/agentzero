[package]
name = "agentzero-storage"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Encrypted key-value storage and conversation memory for AgentZero"
repository.workspace = true

[features]
default = ["storage-encrypted"]
storage-encrypted = ["rusqlite/bundled-sqlcipher"]
storage-plain = ["rusqlite/bundled"]
memory-turso = ["dep:libsql"]
vendored-openssl = ["rusqlite/bundled-sqlcipher-vendored-openssl"]
pool = ["dep:r2d2", "dep:r2d2_sqlite"]

[dependencies]
anyhow.workspace = true
agentzero-core = { workspace = true }
async-trait.workspace = true
base64 = "0.22"
chacha20poly1305 = "0.10"
rand = "0.8"
r2d2 = { version = "0.8", optional = true }
r2d2_sqlite = { version = "0.24", optional = true }
rusqlite.workspace = true
hnsw_rs.workspace = true
parking_lot = "0.12"
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
libsql = { version = "0.9.29", default-features = true, optional = true }
tokio.workspace = true

[dev-dependencies]
proptest = { workspace = true }
