[package]
name = "agentzero-cli"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
default = []
memory-turso = ["dep:agentzero-memory-turso", "agentzero-runtime/memory-turso"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
clap.workspace = true
agentzero-auth = { path = "../../crates/agentzero-auth" }
agentzero-common = { path = "../../crates/agentzero-common" }
agentzero-config = { path = "../../crates/agentzero-config" }
agentzero-core = { path = "../../crates/agentzero-core" }
agentzero-gateway = { path = "../../crates/agentzero-gateway" }
agentzero-infra = { path = "../../crates/agentzero-infra" }
agentzero-memory-sqlite = { path = "../../crates/agentzero-memory-sqlite" }
agentzero-memory-turso = { path = "../../crates/agentzero-memory-turso", optional = true }
agentzero-providers = { path = "../../crates/agentzero-providers" }
agentzero-runtime = { path = "../../crates/agentzero-runtime", features = [] }
console = "0.15"
inquire = "0.7"
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
toml.workspace = true
tracing.workspace = true
url.workspace = true

[dev-dependencies]
temp-env = "0.3"
