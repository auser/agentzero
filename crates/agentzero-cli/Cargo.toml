[package]
name = "agentzero-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[features]
default = ["memory-sqlite"]
memory-sqlite = ["agentzero-runtime/memory-sqlite"]
memory-turso = ["agentzero-memory/memory-turso", "agentzero-runtime/memory-turso"]
rag = ["dep:agentzero-rag", "dep:agentzero-multimodal"]
hardware = ["dep:agentzero-hardware", "dep:agentzero-peripherals"]
channels-standard = ["agentzero-channels/channels-standard"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
clap.workspace = true
clap_complete = "4.5"
agentzero-approval = { workspace = true }
agentzero-auth = { workspace = true }
agentzero-channels = { workspace = true }
agentzero-common = { workspace = true }
agentzero-config = { workspace = true }
agentzero-coordination = { workspace = true }
agentzero-core = { workspace = true }
agentzero-cost = { workspace = true }
agentzero-cron = { workspace = true }
agentzero-daemon = { workspace = true }
agentzero-doctor = { workspace = true }
agentzero-gateway = { workspace = true }
agentzero-hooks = { workspace = true }
agentzero-identity = { workspace = true }
agentzero-infra = { workspace = true }
agentzero-integrations = { workspace = true }
agentzero-memory = { workspace = true }
agentzero-goals = { workspace = true }
agentzero-plugins = { workspace = true }
agentzero-skills = { workspace = true }
agentzero-storage = { workspace = true }
agentzero-tunnel = { workspace = true }
agentzero-update = { workspace = true }
agentzero-providers = { workspace = true }
agentzero-rag = { workspace = true, optional = true }
agentzero-multimodal = { workspace = true, optional = true }
agentzero-hardware = { workspace = true, optional = true }
agentzero-peripherals = { workspace = true, optional = true }
agentzero-local = { workspace = true }
agentzero-runtime = { workspace = true, features = [] }
agentzero-security = { workspace = true }
agentzero-service = { workspace = true }
base64 = "0.22"
console = "0.16"
crossterm = "0.29"
inquire = "0.9"
rand = "0.9"
ratatui = "0.30"
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2 = "0.10"
gag = "1.0"
rusqlite.workspace = true
tokio.workspace = true
toml.workspace = true
tracing.workspace = true
url.workspace = true

[dev-dependencies]
temp-env = "0.3"
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
