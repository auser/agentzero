[package]
name = "agentzero-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "CLI commands and interface for AgentZero"
repository.workspace = true

[features]
default = ["memory-sqlite", "plugins", "gateway", "tui", "interactive", "document-tools", "tools-full", "yaml-policy", "plugin-signing"]
tools-core = ["agentzero-infra/tools-core", "agentzero-tools/tools-core"]
tools-extended = ["tools-core", "agentzero-infra/tools-extended", "agentzero-tools/tools-extended"]
tools-full = ["tools-extended", "agentzero-infra/tools-full", "agentzero-tools/tools-full"]
memory-sqlite = ["agentzero-infra/memory-sqlite", "agentzero-storage/storage-encrypted"]
memory-sqlite-plain = ["agentzero-infra/memory-sqlite", "agentzero-storage/storage-plain"]
document-tools = ["agentzero-infra/document-tools"]
memory-turso = ["agentzero-storage/memory-turso", "agentzero-infra/memory-turso"]
rag = []
hardware = []
channels-standard = ["agentzero-channels/channels-standard"]
embedded-minimal = ["memory-sqlite", "tools-full"]
yaml-policy = ["agentzero-config/yaml-policy"]
plugin-signing = ["plugins", "agentzero-plugins?/signing"]
plugins = ["dep:agentzero-plugins", "agentzero-plugins?/wasm-runtime", "agentzero-infra/wasm-plugins"]
plugin-dev = ["plugins", "agentzero-plugins?/plugin-dev"]
wasm-jit = ["plugins", "agentzero-infra/wasm-jit"]
tls-rustls = ["reqwest/rustls-tls", "agentzero-channels/tls-rustls"]
tls-native = ["reqwest/native-tls", "agentzero-channels/tls-native"]
vendored-openssl = ["agentzero-storage/vendored-openssl"]
gateway = ["dep:agentzero-gateway", "tools-extended"]
tui = ["dep:ratatui", "dep:crossterm"]
interactive = ["dep:inquire", "dep:console"]
privacy = ["agentzero-core/privacy", "agentzero-gateway?/privacy"]
telemetry = ["agentzero-infra/telemetry", "agentzero-gateway?/telemetry"]
local-model = ["agentzero-infra/local-model"]
config-ui = ["dep:agentzero-config-ui"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
clap.workspace = true
clap_complete = "4.5"
agentzero-auth = { workspace = true }
agentzero-channels = { workspace = true }
agentzero-config = { workspace = true }
agentzero-core = { workspace = true }
agentzero-gateway = { workspace = true, optional = true }
agentzero-infra = { workspace = true }
agentzero-orchestrator = { workspace = true }
agentzero-plugins = { workspace = true, optional = true }
agentzero-providers = { workspace = true }
agentzero-storage = { workspace = true }
agentzero-tools = { workspace = true }
agentzero-config-ui = { workspace = true, optional = true }
base64 = "0.22"
console = { version = "0.15", optional = true }
crossterm = { version = "0.28", optional = true }
futures-util.workspace = true
inquire = { version = "0.7", optional = true }
rand = "0.8"
ratatui = { version = "0.29", optional = true }
reqwest = { workspace = true, features = ["stream"] }
serde.workspace = true
serde_json.workspace = true
serde_yaml = "0.9"
sha2 = "0.10"
gag = "1.0"
rusqlite.workspace = true
thiserror.workspace = true
tokio.workspace = true
toml.workspace = true
tracing.workspace = true
url.workspace = true

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
  "Win32_System_Threading",
  "Win32_Foundation",
] }

[dev-dependencies]
temp-env = "0.3"
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
