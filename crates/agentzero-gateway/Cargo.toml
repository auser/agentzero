[package]
name = "agentzero-gateway"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description.workspace = true
repository.workspace = true

[features]
default = []
privacy = ["agentzero-core/privacy", "dep:dashmap", "dep:base64"]

[dependencies]
anyhow.workspace = true
agentzero-config = { workspace = true }
agentzero-core = { workspace = true }
agentzero-infra = { workspace = true }
agentzero-storage = { workspace = true }
agentzero-channels = { workspace = true }
agentzero-providers = { workspace = true }
base64 = { version = "0.22", optional = true }
dashmap = { workspace = true, optional = true }
async-stream = "0.3"
metrics.workspace = true
metrics-exporter-prometheus.workspace = true
axum = { version = "0.7", default-features = false, features = ["http1", "json", "tokio", "ws"] }
futures-util = "0.3"
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true

[dev-dependencies]
http-body-util = "0.1"
reqwest = { workspace = true, features = ["rustls-tls"] }
tower = "0.5"
