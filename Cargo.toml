[workspace]
members = [
  "bin/agentzero",
  "crates/agentzero-bench",
  "crates/agentzero-auth",
  "crates/agentzero-approval",
  "crates/agentzero-identity",
  "crates/agentzero-runtime",
  "crates/agentzero-testkit",
  "crates/agentzero-health",
  "crates/agentzero-heartbeat",
  "crates/agentzero-doctor",
  "crates/agentzero-cron",
  "crates/agentzero-cost",
  "crates/agentzero-coordination",
  "crates/agentzero-goals",
  "crates/agentzero-hooks",
  "crates/agentzero-cli",
  "crates/agentzero-config",
  "crates/agentzero-core",
  "crates/agentzero-infra",
  "crates/agentzero-memory",
  "crates/agentzero-tools",
  "crates/agentzero-providers",
  "crates/agentzero-integrations",
  "crates/agentzero-plugins",
  "crates/agentzero-skills",
  "crates/agentzero-tunnel",
  "crates/agentzero-gateway",
  "crates/agentzero-daemon",
  "crates/agentzero-service",
  "crates/agentzero-channels",
  "crates/agentzero-crypto",
  "crates/agentzero-storage",
  "crates/agentzero-rag",
  "crates/agentzero-multimodal",
  "crates/agentzero-hardware",
  "crates/agentzero-peripherals",
  "crates/agentzero-update",
  "crates/agentzero-autonomy",
  "crates/agentzero-leak-guard",
  "crates/agentzero-local",
  "crates/agentzero-ffi",
  "crates/agentzero-plugin-sdk",
]
resolver = "2"

[workspace.package]
version = "0.1.4"
edition = "2021"
rust-version = "1.80"
license = "MIT"
description = "AgentZero — modular AI-agent runtime and tool framework"
repository = "https://github.com/agentzero-ai/agentzero"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
config = { version = "0.14", default-features = false, features = ["toml"] }
dotenvy = "0.15"
agentzero-approval = { path = "crates/agentzero-approval", version = "0.1.4" }
agentzero-auth = { path = "crates/agentzero-auth", version = "0.1.4" }
agentzero-bench = { path = "crates/agentzero-bench", version = "0.1.4" }
agentzero-channels = { path = "crates/agentzero-channels", version = "0.1.4" }
agentzero-cli = { path = "crates/agentzero-cli", version = "0.1.4", default-features = false }
agentzero-config = { path = "crates/agentzero-config", version = "0.1.4" }
agentzero-coordination = { path = "crates/agentzero-coordination", version = "0.1.4" }
agentzero-crypto = { path = "crates/agentzero-crypto", version = "0.1.4" }
agentzero-core = { path = "crates/agentzero-core", version = "0.1.4" }
agentzero-cost = { path = "crates/agentzero-cost", version = "0.1.4" }
agentzero-cron = { path = "crates/agentzero-cron", version = "0.1.4" }
agentzero-daemon = { path = "crates/agentzero-daemon", version = "0.1.4" }
agentzero-doctor = { path = "crates/agentzero-doctor", version = "0.1.4" }
agentzero-gateway = { path = "crates/agentzero-gateway", version = "0.1.4" }
agentzero-goals = { path = "crates/agentzero-goals", version = "0.1.4" }
agentzero-health = { path = "crates/agentzero-health", version = "0.1.4" }
agentzero-heartbeat = { path = "crates/agentzero-heartbeat", version = "0.1.4" }
agentzero-hooks = { path = "crates/agentzero-hooks", version = "0.1.4" }
agentzero-identity = { path = "crates/agentzero-identity", version = "0.1.4" }
agentzero-integrations = { path = "crates/agentzero-integrations", version = "0.1.4" }
agentzero-infra = { path = "crates/agentzero-infra", version = "0.1.4" }
agentzero-memory = { path = "crates/agentzero-memory", version = "0.1.4" }
agentzero-plugins = { path = "crates/agentzero-plugins", version = "0.1.4", default-features = false }
agentzero-skills = { path = "crates/agentzero-skills", version = "0.1.4" }
agentzero-providers = { path = "crates/agentzero-providers", version = "0.1.4" }
agentzero-runtime = { path = "crates/agentzero-runtime", version = "0.1.4" }
agentzero-service = { path = "crates/agentzero-service", version = "0.1.4" }
agentzero-storage = { path = "crates/agentzero-storage", version = "0.1.4" }
agentzero-rag = { path = "crates/agentzero-rag", version = "0.1.4" }
agentzero-multimodal = { path = "crates/agentzero-multimodal", version = "0.1.4" }
agentzero-hardware = { path = "crates/agentzero-hardware", version = "0.1.4" }
agentzero-peripherals = { path = "crates/agentzero-peripherals", version = "0.1.4" }
agentzero-testkit = { path = "crates/agentzero-testkit", version = "0.1.4" }
agentzero-tools = { path = "crates/agentzero-tools", version = "0.1.4" }
agentzero-tunnel = { path = "crates/agentzero-tunnel", version = "0.1.4" }
agentzero-update = { path = "crates/agentzero-update", version = "0.1.4" }
agentzero-autonomy = { path = "crates/agentzero-autonomy", version = "0.1.4" }
agentzero-leak-guard = { path = "crates/agentzero-leak-guard", version = "0.1.4" }
agentzero-local = { path = "crates/agentzero-local", version = "0.1.4" }
agentzero-ffi = { path = "crates/agentzero-ffi", version = "0.1.4" }
agentzero-plugin-sdk = { path = "crates/agentzero-plugin-sdk", version = "0.1.4" }
futures-util = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "fs", "process", "sync", "io-util", "io-std", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
glob = "0.3"
regex = "1"
tokio-tungstenite = { version = "0.24", default-features = false, features = ["connect", "rustls-tls-native-roots"] }
toml = "0.8"
url = "2"
uuid = { version = "1", features = ["v4"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
sha2 = "0.10"

[profile.release]
codegen-units = 1
lto = "thin"
panic = "abort"
strip = "symbols"

[profile.release-min]
inherits = "release"
lto = "fat"
opt-level = "z"
