[workspace]
members = [
  "bin/agentzero",
  "crates/agentzero-bench",
  "crates/agentzero-common",
  "crates/agentzero-security",
  "crates/agentzero-cli",
  "crates/agentzero-config",
  "crates/agentzero-core",
  "crates/agentzero-infra",
  "crates/agentzero-memory-sqlite",
  "crates/agentzero-memory-turso",
  "crates/agentzero-tools",
  "crates/agentzero-provider-openai",
  "crates/agentzero-gateway",
  "crates/agentzero-plugins-wasm",
]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.80"
license = "MIT"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
config = "0.14"
dotenvy = "0.15"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time", "fs", "process"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
regex = "1"
toml = "0.8"
url = "2"
