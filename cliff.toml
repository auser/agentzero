# git-cliff configuration for AgentZero
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on Keep a Changelog, and this project follows Semantic Versioning.

## [Unreleased]\n
"""
body = """
{%- if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {{ commit.message | upper_first }}
{%- if commit.body %} — {{ commit.body | split(pat="\n") | first | trim }}
{%- endif %}
{% endfor %}
{%- endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^refactor", group = "<!-- 2 -->Changed" },
    { message = "^perf", group = "<!-- 2 -->Changed" },
    { message = "^docs", group = "<!-- 3 -->Changed" },
    { message = "^chore: bump workspace version", skip = true },
    { message = "^chore: add changelog entry", skip = true },
    { message = "^chore", group = "<!-- 4 -->Changed" },
    { message = "^ci", group = "<!-- 4 -->Changed" },
    { message = "^test", group = "<!-- 0 -->Added" },
    { message = "^revert", group = "<!-- 5 -->Removed" },
]
filter_commits = false
sort_commits = "oldest"
topo_order_commits = true
