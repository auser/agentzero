# AgentZero — Full Configuration Reference
# Every section and option shown with defaults. Uncomment/edit as needed.
# Copy this file to your project root as `agentzero.toml`.

# ---------------------------------------------------------------------------
# Provider — LLM provider settings
# ---------------------------------------------------------------------------
[provider]
kind = "openrouter"                         # openrouter | openai | anthropic | ollama
base_url = "https://openrouter.ai/api/v1"  # provider API endpoint
model = "anthropic/claude-sonnet-4-6"     # model identifier
default_temperature = 0.7                   # 0.0 – 2.0
# provider_api = "openai-chat-completions"  # openai-chat-completions | openai-responses
# model_support_vision = true               # set false to block image inputs

# ---------------------------------------------------------------------------
# Memory — conversation memory backend
# ---------------------------------------------------------------------------
[memory]
backend = "sqlite"                          # sqlite | turso
sqlite_path = "./agentzero.db"              # path to SQLite database

# ---------------------------------------------------------------------------
# Agent — core agent loop settings
# ---------------------------------------------------------------------------
[agent]
mode = "development"                        # development | production
max_tool_iterations = 20                    # max tool calls per turn
request_timeout_ms = 30000                  # LLM request timeout
memory_window_size = 50                     # context window message count
max_prompt_chars = 8000                     # max prompt length in chars
parallel_tools = false                      # allow parallel tool execution
tool_dispatcher = "auto"                    # tool dispatch strategy
compact_context = true                      # compress older messages
loop_detection_no_progress_threshold = 3    # identical-output repetitions before self-correction
loop_detection_ping_pong_cycles = 2         # A→B→A cycles before self-correction
loop_detection_failure_streak = 3           # consecutive failures before self-correction

[agent.hooks]
enabled = false
timeout_ms = 250                            # hook script timeout
fail_closed = false                         # block on hook failure
on_error_default = "warn"                   # block | warn | ignore
# on_error_low = "ignore"
# on_error_medium = "warn"
# on_error_high = "block"

# ---------------------------------------------------------------------------
# Security — file, shell, and tool security
# ---------------------------------------------------------------------------
[security]
allowed_root = "."
allowed_commands = ["ls", "pwd", "cat", "echo", "grep", "find"]

[security.read_file]
max_read_bytes = 65536                      # 64 KiB
allow_binary = false

[security.write_file]
enabled = false
max_write_bytes = 65536                     # 64 KiB

[security.shell]
max_args = 8
max_arg_length = 128
max_output_bytes = 8192
forbidden_chars = ";&|><$`\n\r"
context_aware_parsing = true                # smarter shell argument validation

[security.mcp]
enabled = false
allowed_servers = []                        # must be non-empty when enabled

[security.plugin]
enabled = false

[security.audit]
enabled = false
path = "./agentzero-audit.log"

# --- URL access control ---
[security.url_access]
block_private_ip = true
allow_loopback = false
require_first_visit_approval = false
enforce_domain_allowlist = false
allow_cidrs = []
allow_domains = []
domain_allowlist = []
domain_blocklist = []
approved_domains = []

# --- One-time password gating ---
[security.otp]
enabled = false
method = "totp"                             # totp
token_ttl_secs = 30
cache_valid_secs = 300
gated_actions = ["shell", "file_write", "browser_open", "browser", "memory_forget"]
gated_domains = []
gated_domain_categories = []

# --- Emergency stop ---
[security.estop]
enabled = false
state_file = "~/.agentzero/estop-state.json"
require_otp_to_resume = true

# --- Outbound leak guard ---
[security.outbound_leak_guard]
enabled = true
action = "redact"                           # redact | block | warn
sensitivity = 0.7

# --- Perplexity filter (adversarial suffix detection) ---
[security.perplexity_filter]
enable_perplexity_filter = false
perplexity_threshold = 18.0
suffix_window_chars = 64
min_prompt_chars = 32
symbol_ratio_threshold = 0.20

# --- Syscall anomaly detection ---
[security.syscall_anomaly]
enabled = true
strict_mode = false
alert_on_unknown_syscall = true
max_denied_events_per_minute = 5
max_total_events_per_minute = 120
max_alerts_per_minute = 30
alert_cooldown_secs = 20
log_path = "syscall-anomalies.log"
baseline_syscalls = ["read", "write", "openat", "close", "execve", "futex"]

# ---------------------------------------------------------------------------
# Autonomy — approval and guardrail settings
# ---------------------------------------------------------------------------
[autonomy]
level = "supervised"                        # supervised | autonomous
workspace_only = true
auto_approve = []                           # tools auto-approved without confirmation
always_ask = []                             # tools that always require confirmation
forbidden_paths = ["/etc", "/root", "/proc", "/sys", "~/.ssh", "~/.gnupg", "~/.aws"]
allowed_roots = []
allow_sensitive_file_reads = false
allow_sensitive_file_writes = false
non_cli_excluded_tools = []
non_cli_approval_approvers = []
non_cli_natural_language_approval_mode = "direct"
max_actions_per_hour = 20
max_cost_per_day_cents = 500
require_approval_for_medium_risk = true
block_high_risk_commands = true

# Per-channel approval modes:
# [autonomy.non_cli_natural_language_approval_mode_by_channel]
# telegram = "inline"
# slack = "thread"

# ---------------------------------------------------------------------------
# Observability — logging and tracing
# ---------------------------------------------------------------------------
[observability]
backend = "none"                            # none | otel
otel_endpoint = "http://localhost:4318"
otel_service_name = "agentzero"
runtime_trace_mode = "none"                 # none | file
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

# ---------------------------------------------------------------------------
# Research — autonomous research mode
# ---------------------------------------------------------------------------
[research]
enabled = false
trigger = "never"                           # never | always | keywords
keywords = ["find", "search", "check", "investigate"]
min_message_length = 50
max_iterations = 5
show_progress = true

# ---------------------------------------------------------------------------
# Runtime — execution runtime selection
# ---------------------------------------------------------------------------
[runtime]
kind = "native"                             # native | wasm
# reasoning_enabled = true

[runtime.wasm]
tools_dir = "tools/wasm"
fuel_limit = 1000000
memory_limit_mb = 64
max_module_size_mb = 50
allow_workspace_read = false
allow_workspace_write = false
allowed_hosts = []

[runtime.wasm.security]
require_workspace_relative_tools_dir = true
reject_symlink_modules = true
reject_symlink_tools_dir = true
strict_host_validation = true
capability_escalation_mode = "deny"         # deny | warn
module_hash_policy = "warn"                 # warn | enforce | skip

# Per-module SHA-256 hashes:
# [runtime.wasm.security.module_sha256]
# "my_tool.wasm" = "abc123..."

# ---------------------------------------------------------------------------
# Browser — web browsing tool
# ---------------------------------------------------------------------------
[browser]
enabled = false
backend = "agent_browser"                   # agent_browser | native
allowed_domains = []
browser_open = "default"
# session_name = "my-session"
auto_backend_priority = []
agent_browser_command = "agent-browser"
agent_browser_extra_args = []
agent_browser_timeout_ms = 30000
native_headless = true
native_webdriver_url = "http://127.0.0.1:9515"
# native_chrome_path = "/usr/bin/google-chrome"

[browser.computer_use]
endpoint = "http://127.0.0.1:8787/v1/actions"
# api_key = "..."
timeout_ms = 15000
allow_remote_endpoint = false
window_allowlist = []
# max_coordinate_x = 1920
# max_coordinate_y = 1080

# ---------------------------------------------------------------------------
# HTTP Request — direct HTTP request tool
# ---------------------------------------------------------------------------
[http_request]
enabled = false
allowed_domains = []
max_response_size = 1000000                 # 1 MB
timeout_secs = 30
user_agent = "AgentZero/1.0"

# Credential profiles for authenticated requests:
# [http_request.credential_profiles.github]
# header_name = "Authorization"
# env_var = "GITHUB_TOKEN"
# value_prefix = "Bearer "

# ---------------------------------------------------------------------------
# Web Fetch — fetch and convert web pages
# ---------------------------------------------------------------------------
[web_fetch]
enabled = false
provider = "fast_html2md"
# api_key = "..."
# api_url = "..."
allowed_domains = ["*"]
blocked_domains = []
max_response_size = 500000
timeout_secs = 30
user_agent = "AgentZero/1.0"

# ---------------------------------------------------------------------------
# Web Search — web search tool
# ---------------------------------------------------------------------------
[web_search]
enabled = false
provider = "duckduckgo"                     # duckduckgo | brave | perplexity | exa | jina
fallback_providers = []
retries_per_provider = 0
retry_backoff_ms = 250
# api_key = "..."
# api_url = "..."
# brave_api_key = "..."
# perplexity_api_key = "..."
# exa_api_key = "..."
# jina_api_key = "..."
max_results = 5
timeout_secs = 15
user_agent = "AgentZero/1.0"
domain_filter = []
language_filter = []
# country = "US"
# recency_filter = "week"

# ---------------------------------------------------------------------------
# Composio — external tool integrations
# ---------------------------------------------------------------------------
[composio]
enabled = false
# api_key = "..."
entity_id = ""

# ---------------------------------------------------------------------------
# Cost — usage tracking and limits
# ---------------------------------------------------------------------------
[cost]
enabled = false
daily_limit_usd = 10.0
monthly_limit_usd = 100.0
warn_at_percent = 80
allow_override = false

# ---------------------------------------------------------------------------
# Identity — agent identity format
# ---------------------------------------------------------------------------
[identity]
format = "openclaw"                         # openclaw | aieos
# aieos_path = "/etc/aieos.json"
# aieos_inline = "..."

# ---------------------------------------------------------------------------
# Multimodal — image handling
# ---------------------------------------------------------------------------
[multimodal]
max_images = 4
max_image_size_mb = 5
allow_remote_fetch = false

# ---------------------------------------------------------------------------
# Skills — open skill marketplace
# ---------------------------------------------------------------------------
[skills]
open_skills_enabled = false
# open_skills_dir = "./skills"
prompt_injection_mode = "full"              # full | restricted
# clawhub_token = "..."

# ---------------------------------------------------------------------------
# Provider Options — advanced provider tuning
# ---------------------------------------------------------------------------
[provider_options]
# reasoning_level = "medium"                # low | medium | high
# transport = "sse"                         # sse | http

# ---------------------------------------------------------------------------
# Gateway — local HTTP gateway
# ---------------------------------------------------------------------------
[gateway]
host = "127.0.0.1"
port = 42617
require_pairing = true
allow_public_bind = false

[gateway.node_control]
enabled = false
# auth_token = "..."
allowed_node_ids = []

# ---------------------------------------------------------------------------
# Channels — global channel settings
# ---------------------------------------------------------------------------
[channels_config]
message_timeout_secs = 300
stream_mode = "off"                         # off | partial | full
draft_update_interval_ms = 500
interrupt_on_new_message = false

# Per-channel group reply settings:
# [channels_config.group_reply.telegram]
# mode = "mention_only"                     # all_messages | mention_only
# allowed_sender_ids = ["admin-123"]
# bot_name = "MyBot"

# Per-channel ack reaction settings:
# [channels_config.ack_reaction.telegram]
# enabled = true
# emoji_pool = ["👍", "👀", "🤔"]
# strategy = "random"                       # random | first | round_robin
# sample_rate = 1.0

# Ack reaction rules:
# [[channels_config.ack_reaction.telegram.rules]]
# contains_any = ["urgent", "asap"]
# emoji_override = ["🚨"]

# ---------------------------------------------------------------------------
# Query Classification — route queries to specialized models
# ---------------------------------------------------------------------------
[query_classification]
enabled = false

# [[query_classification.rules]]
