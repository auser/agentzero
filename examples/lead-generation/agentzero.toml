# AgentZero — Lead Generation
#
# Four-agent swarm for B2B lead research and qualification.
# Agents: prospector → enricher → qualifier → outreach-drafter
#
# Quick start:
#   1. Set ANTHROPIC_API_KEY
#   2. Run `agentzero gateway --config examples/lead-generation/agentzero.toml`
#   3. Send: "Find 10 SaaS startups in the AI space that recently raised Series A"

[provider]
kind = "anthropic"
model = "claude-sonnet-4-6"

[memory]
backend = "sqlite"
sqlite_path = "./leads.db"

[agent]
mode = "production"
max_tool_iterations = 30
request_timeout_ms = 180_000

[security]
allowed_root = "."
allowed_commands = ["ls", "cat", "grep", "head", "tail", "date", "jq", "sort"]

[security.write_file]
enabled = true
max_write_bytes = 262144

[web_search]
enabled = true

[web_fetch]
enabled = true

[http_request]
enabled = true

# --- Swarm ---

[swarm]
enabled = true

[swarm.agents.prospector]
system_prompt = """You are a Lead Prospector agent.
Given a target market description or ICP (ideal customer profile), find potential leads.
Use web_search to identify companies matching the criteria.
For each prospect, capture: company name, website, industry, size estimate, recent news.
Output a structured list of 10-20 prospects ranked by relevance.
Store prospects in memory for the enricher."""
provider = "anthropic"
model = "claude-sonnet-4-6"
allowed_tools = ["web_search", "web_fetch", "memory_store", "memory_recall", "write_file"]
agentic = true

[swarm.agents.enricher]
system_prompt = """You are a Lead Enricher agent.
Given a list of prospects from the prospector, enrich each with detailed data.
Use web_fetch and http_request to find: key decision-makers (names, titles, LinkedIn),
company tech stack, recent funding, employee count, and contact information.
Save enriched profiles as structured JSON files.
Flag any prospects where data quality is low."""
provider = "anthropic"
model = "claude-sonnet-4-6"
allowed_tools = ["web_search", "web_fetch", "http_request", "memory_store", "memory_recall", "write_file", "read_file"]
agentic = true

[swarm.agents.qualifier]
system_prompt = """You are a Lead Qualifier agent.
Score and prioritize enriched leads based on fit criteria.
Evaluate: company size fit, industry alignment, budget signals (funding), timing indicators,
and technology compatibility.
Assign a qualification score (A/B/C/D) with reasoning.
Output a ranked lead list with scores and recommended action for each."""
provider = "anthropic"
model = "claude-sonnet-4-6"
allowed_tools = ["memory_recall", "read_file", "write_file"]
agentic = true

[swarm.agents.outreach-drafter]
system_prompt = """You are an Outreach Drafter agent.
For each qualified lead (A and B tier), draft a personalized outreach message.
Reference specific company details, recent news, and pain points relevant to our offering.
Write both an email template and a LinkedIn connection request for each lead.
Save all drafts organized by company name.
Include a summary CSV with: company, contact, score, email subject line."""
provider = "anthropic"
model = "claude-sonnet-4-6"
allowed_tools = ["memory_recall", "read_file", "write_file"]
agentic = true

# Pipeline: prospector → enricher → qualifier → outreach-drafter
[[swarm.pipelines]]
name = "lead-generation"
trigger = "default"
steps = [
    { agent = "prospector" },
    { agent = "enricher" },
    { agent = "qualifier" },
    { agent = "outreach-drafter" },
]
