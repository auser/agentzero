# AgentZero — Research-to-Brief Pipeline
#
# A multi-step pipeline that turns a topic into a polished research brief.
# Four agents work in sequence: Researcher → Scraper → Analyst → Writer.
#
# All pipeline agents use a cloud model (Haiku) for reliable tool use.
# The default provider is local (builtin) for non-pipeline / simple chat.
# Each agent inherits the default provider unless overridden per-agent.
#
# Quick start:
#   1. Copy this file to your project root as `agentzero.toml`
#   2. Set ANTHROPIC_API_KEY for cloud agents (or swap to openai/openrouter)
#   3. Run `agentzero gateway`
#   4. Send: "Research the current state of AI regulation in the EU"

# ---------------------------------------------------------------------------
# Provider — default LLM (local, private — used by scraper + writer)
# ---------------------------------------------------------------------------
[provider]
kind = "builtin"
model = "qwen2.5-coder-3b"
# For a fully-local setup use 7B+ for all agents:
#   model = "qwen2.5:7b"
# For a fully-cloud setup:
#   kind = "anthropic"
#   model = "claude-haiku-4-5"


# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
[memory]
backend = "sqlite"
sqlite_path = "./research.db"

# ---------------------------------------------------------------------------
# Agent loop
# ---------------------------------------------------------------------------
[agent]
mode = "production"
max_tool_iterations = 25
parallel_tools = false
request_timeout_ms = 120_000  # 2 min — web search + LLM calls need headroom

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
[security]
allowed_root = "."
allowed_commands = [
  "ls", "pwd", "cat", "echo", "grep", "find", "head", "tail",
  "wc", "sort", "uniq", "diff", "file", "which", "mkdir", "cp",
  "mv", "touch", "date", "jq", "python3",
]

[security.write_file]
enabled = true
max_write_bytes = 131072                   # 128 KiB — briefs can be long

[security.shell]
max_output_bytes = 65536
context_aware_parsing = true

[security.outbound_leak_guard]
enabled = true
action = "redact"

# ---------------------------------------------------------------------------
# Autonomy
# ---------------------------------------------------------------------------
[autonomy]
level = "autonomous"
workspace_only = true
max_actions_per_hour = 500
max_cost_per_day_cents = 3000

# ---------------------------------------------------------------------------
# Web tools — all enabled for the research pipeline
# ---------------------------------------------------------------------------
[web_search]
enabled = true
# DuckDuckGo frequently blocks automated requests with CAPTCHAs.
# Use Brave or Jina for reliable search in pipelines:
provider = "brave"                         # set BRAVE_API_KEY env var
# provider = "jina"                       # alternative: set JINA_API_KEY
# provider = "duckduckgo"                 # free but unreliable (CAPTCHA blocks)
max_results = 10
timeout_secs = 15

[web_fetch]
enabled = true
allowed_domains = ["*"]
max_response_size = 500000
timeout_secs = 30

[http_request]
enabled = true
timeout_secs = 30

[browser]
enabled = true
backend = "agent_browser"
agent_browser_command = "./scripts/agent-browser/index.js"
agent_browser_timeout_ms = 30000
# allowed_domains = []                    # empty = all domains

# ---------------------------------------------------------------------------
# Swarm — the research pipeline
# ---------------------------------------------------------------------------
[swarm]
enabled = true
max_agents = 5
event_bus_capacity = 256
event_log_path = "./research/events.jsonl"   # persist events so research survives restarts
shutdown_grace_ms = 10000

# Fast router for message classification
# [swarm.router]
# provider = "anthropic"
# model = "claude-haiku-4-5"
# fallback_to_keywords = true


# ---------------------------------------------------------------------------
# Agent: Researcher — broad web search and initial data gathering
# Uses a cloud model because tool selection requires strong reasoning.
# ---------------------------------------------------------------------------
[swarm.agents.researcher]
name = "Researcher"
description = "Research agent. Searches the web for information on a given topic, compiles raw findings with sources and key data points."
keywords = ["research", "search", "find", "investigate", "look up", "what is", "how does"]
provider = "anthropic"                     # cloud — needs reliable tool use
model = "claude-haiku-4-5"                 # fast + cheap, good enough for search
# provider = "openai"                     # alternative cloud provider
# model = "gpt-4.1-mini"
privacy_boundary = "encrypted_only"
allowed_tools = ["web_search", "web_fetch", "write_file"]
subscribes_to = ["channel.*.message"]
produces = ["task.research.raw"]
max_iterations = 15
system_prompt = """You are a research agent. You MUST use the web_search tool to find information.

IMPORTANT: Always start by calling web_search. Never try to read files first.

Steps:
1. Call web_search with a clear query about the topic
2. Call web_search again with a different angle on the topic
3. Optionally use web_fetch to get more detail from the best URLs
4. Call write_file to save findings to `research/raw-findings.md`

Write your findings in this format:
# Raw Research Findings: [Topic]
## Sources
- [Title](URL) — key takeaway
## Key Facts & Data Points
- Fact with source citation
## Trends & Patterns
- Patterns observed across sources

Cite every claim. Prioritize recent, authoritative sources."""

# ---------------------------------------------------------------------------
# Agent: Scraper — deep-dives into specific URLs
# Uses cloud model: needs to call read_file → parse URLs → call web_fetch,
# which requires reliable multi-step tool use.
# ---------------------------------------------------------------------------
[swarm.agents.scraper]
name = "Scraper"
description = "Data extraction agent. Deep-dives into specific URLs from research findings to extract detailed content, metrics, and structured data."
keywords = ["scrape", "extract", "crawl", "data", "metrics"]
provider = "anthropic"                     # cloud — needs reliable tool use
model = "claude-haiku-4-5"
privacy_boundary = "encrypted_only"
allowed_tools = ["web_fetch", "read_file", "write_file"]
subscribes_to = ["task.research.raw"]
produces = ["task.research.detailed"]
max_iterations = 15
system_prompt = """You are a data extraction agent. You deep-dive into URLs from research findings.

Steps:
1. Call read_file to read `research/raw-findings.md`
2. Find the URLs listed in the sources section
3. Call web_fetch on the top 3-5 URLs to get detailed content
4. Call write_file to save extracted data to `research/detailed-data.md`

Write your output in this format:
# Detailed Extraction: [Topic]
## Source 1: [Title]
URL: ...
Key Data:
- Statistic/metric: value
- Quote: "..."

Focus on extractable facts, not opinions."""

# ---------------------------------------------------------------------------
# Agent: Analyst — synthesizes research into structured analysis
# Uses a cloud model because synthesis requires strong reasoning.
# ---------------------------------------------------------------------------
[swarm.agents.analyst]
name = "Analyst"
description = "Analysis agent. Synthesizes raw research and extracted data into structured analysis with insights, themes, and recommendations."
keywords = ["analyze", "synthesize", "insight", "trend", "compare"]
provider = "anthropic"                     # cloud — needs reasoning for synthesis
model = "claude-haiku-4-5"
privacy_boundary = "encrypted_only"
allowed_tools = ["read_file", "write_file"]
subscribes_to = ["task.research.detailed"]
produces = ["task.analysis.complete"]
max_iterations = 10
system_prompt = """You are an analysis agent. You synthesize research into insights.

Steps:
1. Call read_file to read `research/raw-findings.md`
2. Call read_file to read `research/detailed-data.md`
3. Identify themes, trends, and patterns across sources
4. Call write_file to save analysis to `research/analysis.md`

Write your output in this format:
# Analysis: [Topic]
## Executive Summary
2-3 sentence overview
## Key Themes
- Theme with supporting evidence
## Insights & Implications
- Insight with data
## Recommendations
- Actionable recommendation

Be rigorous. Distinguish between evidence and speculation."""

# ---------------------------------------------------------------------------
# Agent: Writer — produces the final polished brief
# Uses cloud model: needs to call read_file on multiple files then synthesize
# and call write_file, which requires reliable multi-step tool use.
# ---------------------------------------------------------------------------
[swarm.agents.writer]
name = "Writer"
description = "Brief writer. Produces polished, publication-ready research briefs from analysis with clear structure, compelling narrative, and actionable takeaways."
keywords = ["write", "brief", "report", "document", "summarize", "draft"]
provider = "anthropic"                     # cloud — needs reliable tool use
model = "claude-haiku-4-5"
privacy_boundary = "encrypted_only"
allowed_tools = ["read_file", "write_file"]
subscribes_to = ["task.analysis.complete"]
produces = ["task.brief.complete"]
max_iterations = 10
system_prompt = """You are a brief writer. You produce polished research briefs.

Steps:
1. Call read_file to read `research/analysis.md`
2. Call read_file to read `research/raw-findings.md`
3. Synthesize everything into a clear brief
4. Call write_file to save the brief to `research/brief.md`

Write your output in this format:
# [Topic]: Research Brief
## At a Glance
- 3-5 bullet executive summary
## Key Findings
- Finding with evidence
## What This Means
- Implications
## Recommended Actions
- Action items
## Sources
- [Source](URL)

Write for a busy executive. Every claim must cite its source."""

# ---------------------------------------------------------------------------
# Pipeline: research-to-brief
# ---------------------------------------------------------------------------
[[swarm.pipelines]]
name = "research-to-brief"
channel_reply = true
on_step_error = "skip"                     # skip scraper if it fails (browser may not be available)
max_retries = 1
step_timeout_secs = 120
steps = ["researcher", "scraper", "analyst", "writer"]

[swarm.pipelines.trigger]
keywords = ["research", "brief", "analyze", "investigate", "report on"]
regex = "(?i)(research|write a brief|analyze|report on)\\s+"

# ---------------------------------------------------------------------------
# Gateway
# ---------------------------------------------------------------------------
[gateway]
host = "127.0.0.1"
port = 42617
require_pairing = true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[logging]
format = "text"
level = "info"
