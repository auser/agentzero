name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Setup Strawberry Perl (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "C:/Strawberry/c/bin" >> "$GITHUB_PATH"
          echo "C:/Strawberry/perl/site/bin" >> "$GITHUB_PATH"
          echo "C:/Strawberry/perl/bin" >> "$GITHUB_PATH"
          if [ -f /usr/bin/perl ]; then
            mv /usr/bin/perl /usr/bin/perl-msys2
          fi
      - name: Install NASM (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install nasm --no-progress -y
      - name: fmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: clippy (unix)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test (unix)
        if: matrix.os != 'windows-latest'
        run: cargo nextest run --workspace
      - name: test (windows)
        if: matrix.os == 'windows-latest'
        run: cargo nextest run --workspace --features vendored-openssl --exclude agentzero-bench
      - name: verify dependency policy
        if: matrix.os == 'ubuntu-latest'
        run: scripts/verify-dependency-policy.sh
      - name: Check agentzero-autopilot with memory-turso feature
        if: matrix.os == 'ubuntu-latest'
        run: cargo check -p agentzero-autopilot --features memory-turso
      - name: release build (default)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p agentzero --release
      - name: release size budget (default)
        if: matrix.os == 'ubuntu-latest'
        # Budget accounts for two intentionally large subsystems:
        #   • candle (local ML inference, ~10.6 MB) — core to the local-first,
        #     privacy-preserving design; not removable without breaking local models.
        #   • wasmi + WASM runtime (~1.2 MB) — powers the self-updating plugin
        #     system; not removable without breaking that mechanism.
        # Current actual size: ~35.8 MB.  Budget = actual + ~2 MB growth headroom.
        # If this check fails, run `cargo bloat --release -p agentzero --crates`
        # before adding new large deps — do not simply raise the number.
        run: scripts/check-binary-size.sh --binary target/release/agentzero --max-bytes 38000000
      - name: release build (minimal)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p agentzero --profile release-min --no-default-features --features minimal
      - name: release size budget (minimal)
        if: matrix.os == 'ubuntu-latest'
        # Minimal build (~8.3 MB actual) strips candle, wasmi, gateway, and TUI
        # but retains tokio, reqwest, rustls, and sqlite — the irreducible async
        # networking + storage baseline.  Budget = actual + ~1.7 MB headroom.
        run: scripts/check-binary-size.sh --binary target/release-min/agentzero --max-bytes 10000000
      - name: release build (embedded)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p agentzero --profile release-min --no-default-features --features embedded
      - name: release size budget (embedded)
        if: matrix.os == 'ubuntu-latest'
        # Embedded build uses the same feature set as minimal; budget matches.
        run: scripts/check-binary-size.sh --binary target/release-min/agentzero --max-bytes 10000000
      - name: binary size summary
        if: matrix.os == 'ubuntu-latest'
        run: |
          DEFAULT_SIZE=$(wc -c < target/release/agentzero | tr -d ' ')
          MINIMAL_SIZE=$(wc -c < target/release-min/agentzero | tr -d ' ')
          EMBEDDED_SIZE=$(wc -c < target/release-min/agentzero | tr -d ' ')
          DEFAULT_MB=$(echo "scale=2; $DEFAULT_SIZE / 1048576" | bc)
          MINIMAL_MB=$(echo "scale=2; $MINIMAL_SIZE / 1048576" | bc)
          EMBEDDED_MB=$(echo "scale=2; $EMBEDDED_SIZE / 1048576" | bc)
          echo "## Binary Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Profile | Size | Budget |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Default | ${DEFAULT_MB} MB | 38 MB (candle + wasmi by design) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Minimal | ${MINIMAL_MB} MB | 10 MB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Embedded | ${EMBEDDED_MB} MB | 10 MB |" >> "$GITHUB_STEP_SUMMARY"
      - name: reproducible build check
        if: matrix.os == 'ubuntu-latest'
        run: |
          HASH1=$(sha256sum target/release/agentzero | awk '{print $1}')
          rm target/release/agentzero
          cargo build -p agentzero --release
          HASH2=$(sha256sum target/release/agentzero | awk '{print $1}')
          echo "Build 1: $HASH1"
          echo "Build 2: $HASH2"
          if [ "$HASH1" = "$HASH2" ]; then
            echo "Reproducible build: PASS"
          else
            echo "::warning::Reproducible build check failed — hashes differ"
          fi
      - name: cold-start latency
        if: matrix.os == 'ubuntu-latest'
        run: scripts/bench-cli-startup.sh --iterations 20 --command "--help"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: install cargo-deny
        run: cargo install cargo-deny --locked
      - name: security audits
        run: scripts/run-security-audits.sh

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build container image for scanning
        run: docker build -t agentzero:scan .
      - name: Get date for Trivy DB cache key
        id: trivy-date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Cache Trivy vulnerability DB
        # Use actions/cache@v5 (Node.js 24) here so that trivy-action can be
        # told cache: false — preventing it from invoking its own internal
        # actions/cache@v4.2.4 (Node.js 20) step and eliminating the
        # deprecation annotation.
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: cache-trivy-${{ steps.trivy-date.outputs.date }}
          restore-keys: cache-trivy-
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: agentzero:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          cache: false
          cache-dir: ${{ github.workspace }}/.cache/trivy

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: generate coverage
        run: scripts/run-coverage.sh --output-dir coverage
      - name: upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage

  cross-arm:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: install cross
        run: cargo install cross --locked
      - name: cross build (aarch64)
        run: cross build --workspace --target aarch64-unknown-linux-gnu --features vendored-openssl
      - name: cross test (aarch64)
        run: cross test --workspace --target aarch64-unknown-linux-gnu --features vendored-openssl

  # e2e-ollama: removed from CI — small local models (llama3.2 3B) are too
  # nondeterministic for reliable tool-use assertions. The tests remain in
  # crates/agentzero-infra/tests/e2e_ollama.rs and can be run manually:
  #   cargo nextest run -p agentzero-infra --test e2e_ollama --run-ignored only
