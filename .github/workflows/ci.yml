name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@8a02ed5e290d8afc7e587930243f3016b3223f50 # v2 + node24
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: verify dependency policy
        run: scripts/verify-dependency-policy.sh
      - name: release build (default)
        run: cargo build -p agentzero --release
      - name: release size budget (default)
        run: scripts/check-binary-size.sh --binary target/release/agentzero --max-bytes 30000000
      - name: release build (minimal)
        run: cargo build -p agentzero --profile release-min --no-default-features --features minimal
      - name: release size budget (minimal)
        run: scripts/check-binary-size.sh --binary target/release-min/agentzero --max-bytes 8000000
      - name: release build (embedded)
        run: cargo build -p agentzero --profile release-min --no-default-features --features embedded
      - name: release size budget (embedded)
        run: scripts/check-binary-size.sh --binary target/release-min/agentzero --max-bytes 11000000
      - name: cold-start latency
        run: scripts/bench-cli-startup.sh --iterations 20 --command "--help"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@8a02ed5e290d8afc7e587930243f3016b3223f50 # v2 + node24
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: install cargo-deny
        run: cargo install cargo-deny --locked
      - name: security audits
        run: scripts/run-security-audits.sh

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build container image for scanning
        run: docker build -t agentzero:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: agentzero:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@8a02ed5e290d8afc7e587930243f3016b3223f50 # v2 + node24
      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: generate coverage
        run: scripts/run-coverage.sh --output-dir coverage
      - name: upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage

  e2e-ollama:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@8a02ed5e290d8afc7e587930243f3016b3223f50 # v2 + node24
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Start Ollama and pull model
        run: |
          ollama serve &
          sleep 3
          ollama pull llama3.2:latest
      - name: Install nextest
        run: cargo install cargo-nextest --locked
      - name: Run Ollama e2e tests
        run: cargo nextest run -p agentzero-infra --test e2e_ollama --run-ignored only --test-threads 1 --profile ci
