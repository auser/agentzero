name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: verify dependency policy
        run: scripts/verify-dependency-policy.sh
      - name: release build (default)
        run: cargo build -p agentzero --release
      - name: release size budget (default)
        run: scripts/check-binary-size.sh --binary target/release/agentzero --max-bytes 30000000
      - name: release build (minimal)
        run: cargo build -p agentzero --profile release-min --no-default-features --features minimal
      - name: release size budget (minimal)
        run: scripts/check-binary-size.sh --binary target/release-min/agentzero --max-bytes 8000000
      - name: cold-start latency
        run: scripts/bench-cli-startup.sh --iterations 20 --command "--help"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: install cargo-deny
        run: cargo install cargo-deny --locked
      - name: security audits
        run: scripts/run-security-audits.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: generate coverage
        run: scripts/run-coverage.sh --output-dir coverage
      - name: upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage

  e2e-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [checks]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: start ollama and pull model
        run: |
          ollama serve &
          sleep 5
          ollama pull tinyllama
      - name: run e2e tests
        env:
          LOCAL_LLM_URL: http://localhost:11434
          LOCAL_LLM_MODEL: tinyllama
        run: cargo test --workspace -- --ignored

  build-artifacts:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [checks, security]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
            bin_path: target/release/agentzero
            asset_name: agentzero-linux-x86_64
          - os: macos-latest
            target_name: macos-x86_64
            bin_path: target/release/agentzero
            asset_name: agentzero-macos-x86_64
          - os: windows-latest
            target_name: windows-x86_64
            bin_path: target/release/agentzero.exe
            asset_name: agentzero-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary (unix)
        if: matrix.os != 'windows-latest'
        run: cargo build -p agentzero --release
      - name: Build release binary (windows)
        if: matrix.os == 'windows-latest'
        run: cargo build -p agentzero --release --features vendored-openssl
      - name: Validate linux size budget
        if: matrix.os == 'ubuntu-latest'
        run: scripts/check-binary-size.sh --binary target/release/agentzero --max-bytes 30000000
      - name: Package artifact (unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp "${{ matrix.bin_path }}" "dist/${{ matrix.asset_name }}"
      - name: Package artifact (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "${{ matrix.bin_path }}" "dist/${{ matrix.asset_name }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
