name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without 'v' prefix (e.g., 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="${{ inputs.version }}"
          fi
          echo "value=$ver" >> "$GITHUB_OUTPUT"
      - name: Verify changelog + package versions
        run: scripts/verify-release-version.sh --version "${{ steps.version.outputs.value }}"
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: install cargo-deny
        run: cargo install cargo-deny --locked
      - name: security audits
        run: scripts/run-security-audits.sh
      - name: Run quality gates
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            bin_path: target/x86_64-unknown-linux-gnu/release/agentzero
            ext: ""
            cross: false
          - os: ubuntu-latest
            target_name: linux-aarch64
            rust_target: aarch64-unknown-linux-gnu
            bin_path: target/aarch64-unknown-linux-gnu/release/agentzero
            ext: ""
            cross: true
          - os: macos-latest
            target_name: macos-aarch64
            rust_target: aarch64-apple-darwin
            bin_path: target/aarch64-apple-darwin/release/agentzero
            ext: ""
            cross: false
          - os: macos-latest
            target_name: macos-x86_64
            rust_target: x86_64-apple-darwin
            bin_path: target/x86_64-apple-darwin/release/agentzero
            ext: ""
            cross: true
          - os: windows-latest
            target_name: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            bin_path: target/x86_64-pc-windows-msvc/release/agentzero.exe
            ext: ".exe"
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target_name == 'linux-aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="${{ inputs.version }}"
          fi
          echo "value=$ver" >> "$GITHUB_OUTPUT"
      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target_name == 'linux-aarch64' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build -p agentzero --release --target ${{ matrix.rust_target }}
      - name: Validate linux size budget
        if: matrix.target_name == 'linux-x86_64'
        run: scripts/check-binary-size.sh --binary "${{ matrix.bin_path }}" --max-bytes 20000000
      - name: Package artifact (unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp "${{ matrix.bin_path }}" "dist/agentzero-v${{ steps.version.outputs.value }}-${{ matrix.target_name }}${{ matrix.ext }}"
      - name: Package artifact (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "${{ matrix.bin_path }}" "dist/agentzero-v${{ steps.version.outputs.value }}-${{ matrix.target_name }}${{ matrix.ext }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_name }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v${{ inputs.version }}"
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum agentzero-* > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: dist/*

  publish-crate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p agentzero --no-verify
