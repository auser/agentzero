name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without 'v' prefix (e.g., 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="${{ inputs.version }}"
          fi
          echo "value=$ver" >> "$GITHUB_OUTPUT"
      - name: Verify changelog + package versions
        run: scripts/verify-release-version.sh --version "${{ steps.version.outputs.value }}"
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: install cargo-deny
        run: cargo install cargo-deny --locked
      - name: security audits
        run: scripts/run-security-audits.sh
      - name: Run quality gates
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            bin_path: target/x86_64-unknown-linux-gnu/release/agentzero
            ext: ""
            cross: false
          - os: ubuntu-latest
            target_name: linux-aarch64
            rust_target: aarch64-unknown-linux-gnu
            bin_path: target/aarch64-unknown-linux-gnu/release/agentzero
            ext: ""
            cross: true
            extra_features: vendored-openssl
          - os: ubuntu-latest
            target_name: linux-armv7
            rust_target: armv7-unknown-linux-gnueabihf
            bin_path: target/armv7-unknown-linux-gnueabihf/release/agentzero
            ext: ""
            cross: true
            extra_features: vendored-openssl
          - os: ubuntu-latest
            target_name: linux-x86_64-musl
            rust_target: x86_64-unknown-linux-musl
            bin_path: target/x86_64-unknown-linux-musl/release/agentzero
            ext: ""
            cross: false
            extra_features: vendored-openssl
          - os: ubuntu-latest
            target_name: linux-aarch64-musl
            rust_target: aarch64-unknown-linux-musl
            bin_path: target/aarch64-unknown-linux-musl/release/agentzero
            ext: ""
            cross: true
            use_zigbuild: true
            extra_features: vendored-openssl
          - os: macos-latest
            target_name: macos-aarch64
            rust_target: aarch64-apple-darwin
            bin_path: target/aarch64-apple-darwin/release/agentzero
            ext: ""
            cross: false
          - os: macos-latest
            target_name: macos-x86_64
            rust_target: x86_64-apple-darwin
            bin_path: target/x86_64-apple-darwin/release/agentzero
            ext: ""
            cross: true
          - os: windows-latest
            target_name: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            bin_path: target/x86_64-pc-windows-msvc/release/agentzero.exe
            ext: ".exe"
            cross: false
            extra_features: vendored-openssl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      - name: Setup Strawberry Perl (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "C:/Strawberry/c/bin" >> "$GITHUB_PATH"
          echo "C:/Strawberry/perl/site/bin" >> "$GITHUB_PATH"
          echo "C:/Strawberry/perl/bin" >> "$GITHUB_PATH"
          # MSYS2 Perl lacks modules needed by openssl-src; hide it
          if [ -f /usr/bin/perl ]; then
            mv /usr/bin/perl /usr/bin/perl-msys2
          fi
      - name: Install NASM (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/setup-nasm@v1
      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target_name == 'linux-aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install cross-compilation tools (Linux armv7)
        if: matrix.target_name == 'linux-armv7'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Install musl tools (Linux x86_64 musl)
        if: matrix.target_name == 'linux-x86_64-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Install cross-compilation tools (Linux aarch64 musl)
        if: matrix.target_name == 'linux-aarch64-musl'
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild --locked
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="${{ inputs.version }}"
          fi
          echo "value=$ver" >> "$GITHUB_OUTPUT"
      - name: Build release binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: >-
            ${{ matrix.target_name == 'linux-aarch64' && 'aarch64-linux-gnu-gcc' || '' }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: >-
            ${{ matrix.target_name == 'linux-armv7' && 'arm-linux-gnueabihf-gcc' || '' }}
        run: |
          FEATURES="${{ matrix.extra_features }}"
          FEAT_FLAG=""
          if [[ -n "$FEATURES" ]]; then
            FEAT_FLAG="--features $FEATURES"
          fi
          if [[ "${{ matrix.use_zigbuild }}" == "true" ]]; then
            cargo zigbuild -p agentzero --release --target ${{ matrix.rust_target }} $FEAT_FLAG
          else
            cargo build -p agentzero --release --target ${{ matrix.rust_target }} $FEAT_FLAG
          fi
      - name: Validate linux size budget (default)
        if: matrix.target_name == 'linux-x86_64'
        run: scripts/check-binary-size.sh --binary "${{ matrix.bin_path }}" --max-bytes 30000000
      - name: Build minimal binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: >-
            ${{ matrix.target_name == 'linux-aarch64' && 'aarch64-linux-gnu-gcc' || '' }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: >-
            ${{ matrix.target_name == 'linux-armv7' && 'arm-linux-gnueabihf-gcc' || '' }}
          RUST_TARGET: ${{ matrix.rust_target }}
          USE_ZIGBUILD: ${{ matrix.use_zigbuild }}
        run: |
          FEATURES="minimal"
          if [[ -n "${{ matrix.extra_features }}" ]]; then
            FEATURES="$FEATURES,${{ matrix.extra_features }}"
          fi
          if [[ "$USE_ZIGBUILD" == "true" ]]; then
            cargo zigbuild -p agentzero --profile release-min --target "$RUST_TARGET" --no-default-features --features "$FEATURES"
          else
            cargo build -p agentzero --profile release-min --target "$RUST_TARGET" --no-default-features --features "$FEATURES"
          fi
      - name: Validate linux size budget (minimal)
        if: matrix.target_name == 'linux-x86_64'
        env:
          MINIMAL_BIN: target/${{ matrix.rust_target }}/release-min/agentzero${{ matrix.ext }}
        run: scripts/check-binary-size.sh --binary "$MINIMAL_BIN" --max-bytes 8000000
      - name: Package artifact (unix)
        if: matrix.os != 'windows-latest'
        env:
          VERSION: ${{ steps.version.outputs.value }}
          TARGET_NAME: ${{ matrix.target_name }}
          EXT: ${{ matrix.ext }}
          BIN_PATH: ${{ matrix.bin_path }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          mkdir -p dist
          cp "$BIN_PATH" "dist/agentzero-v${VERSION}-${TARGET_NAME}${EXT}"
          cp "target/${RUST_TARGET}/release-min/agentzero${EXT}" "dist/agentzero-v${VERSION}-${TARGET_NAME}-minimal${EXT}"
      - name: Package artifact (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.value }}
          TARGET_NAME: ${{ matrix.target_name }}
          EXT: ${{ matrix.ext }}
          BIN_PATH: ${{ matrix.bin_path }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "$env:BIN_PATH" "dist/agentzero-v$env:VERSION-$env:TARGET_NAME$env:EXT"
          Copy-Item "target/$env:RUST_TARGET/release-min/agentzero$env:EXT" "dist/agentzero-v$env:VERSION-$env:TARGET_NAME-minimal$env:EXT"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target_name }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v${{ inputs.version }}"
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum agentzero-* > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: dist/*

  publish-crate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish all workspace crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-crates.sh


