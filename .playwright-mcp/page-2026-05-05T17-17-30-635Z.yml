  - generic [ref=e76]:
    - generic [ref=e77]:
      - generic [ref=e78]: What makes MVM different
      - heading "The application process is not a sufficient security boundary." [level=2] [ref=e79]
      - paragraph [ref=e80]: AI-native workloads should not run as trusted application code. They should run as isolated, signed, policy-governed execution units. MVM places policy enforcement below the workload — in a path the tenant cannot bypass.
    - generic [ref=e81]:
      - generic [ref=e82]:
        - img [ref=e84]
        - heading "Unbypassable policy plane" [level=3] [ref=e87]
        - paragraph [ref=e88]: PII detection, destination policy, tool-call validation, and exploit controls live in the runtime supervisor — outside the tenant sandbox. Every outbound path passes through policy enforcement before it reaches a network, tool, webhook, or external system. A prompt injection that fully compromises tenant code cannot switch them off.
      - generic [ref=e89]:
        - img [ref=e91]
        - heading "One execution contract, every backend" [level=3] [ref=e94]
        - paragraph [ref=e95]: The same signed image, decorated execution plan, policy bundle, and audit chain runs across Firecracker, Lima, Incus, containerd, and additional adapter-driven runtimes. The runtime backend is an implementation detail. The workload execution contract is the product boundary.
      - generic [ref=e96]:
        - img [ref=e98]
        - heading "mvmd orchestrates the fleet" [level=3] [ref=e101]
        - paragraph [ref=e102]: Tenants, releases, host lifecycle, wake/sleep, load-aware placement, key rotation, policy versions, attestation, and audit are managed as one system. Native support targets for AMD SEV-SNP and Intel TDX gate sensitive key release on hardware-attested workload identity.
  - generic [ref=e104]:
    - generic [ref=e105]:
      - generic [ref=e106]: How it works
      - heading "From workload intent to a signed, decorated, audited execution." [level=2] [ref=e107]
      - paragraph [ref=e108]: Workloads are not launched from ambiguous intent. mvmd resolves intent into a complete execution plan, validates the signed image and policy bundle, and converges the runtime toward that plan.
    - generic [ref=e109]:
      - generic [ref=e110]:
        - generic [ref=e111]: STEP 01
        - heading "Sign & decorate" [level=3] [ref=e112]
        - paragraph [ref=e113]: "Build the workload image. Sign it. Attach a signed policy bundle. mvmd resolves intent into a decorated execution plan: tenant identity, runtime profile, resources, secrets, egress, artifacts, lifecycle, audit."
        - generic [ref=e114]: plan signed · policy v2026.04.1
      - generic [ref=e115]:
        - generic [ref=e116]: STEP 02
        - heading "Place & verify" [level=3] [ref=e117]
        - paragraph [ref=e118]: mvmd selects a healthy, eligible host based on trust tier, capacity, data classification, and load. The runtime backend — Firecracker, Lima, Incus, or containerd — verifies the image signature and content identity before boot.
        - generic [ref=e119]: "host trust tier: hosted-confidential"
      - generic [ref=e120]:
        - generic [ref=e121]: STEP 03
        - heading "Attest & release" [level=3] [ref=e122]
        - paragraph [ref=e123]: The bootstrap zone produces an attestation report where supported (SEV-SNP, TDX). Scoped, short-lived credentials are released only if measurement, platform identity, freshness, and policy all pass.
        - generic [ref=e124]: ✓ attestation verified
      - generic [ref=e125]:
        - generic [ref=e126]: STEP 04
        - heading "Execute & audit" [level=3] [ref=e127]
        - paragraph [ref=e128]: The tenant sandbox runs over separate control and sandbox data planes via vsock. Every tool call, egress, and artifact flows through the runtime supervisor's policy plane. Lifecycle, key, and policy events become tamper-evident audit records.
        - generic [ref=e129]: audit · keys · lifecycle
