  - generic [ref=e210]:
    - generic [ref=e211]:
      - generic [ref=e212]: Where MVM fits
      - heading "If a workload is powerful enough to be useful, it is powerful enough to require a real runtime boundary." [level=2] [ref=e213]
    - generic [ref=e214]:
      - generic [ref=e215]:
        - generic [ref=e216]: AI agents & tools
        - heading "Tool calls as a policy boundary" [level=3] [ref=e217]
        - paragraph [ref=e218]: Mediated egress and tool-call validation outside the tenant workload. A prompt-injected agent cannot route around destination policy, PII redaction, or audit.
      - generic [ref=e219]:
        - generic [ref=e220]: Code interpreters
        - heading "Python that won't inherit host privilege" [level=3] [ref=e221]
        - paragraph [ref=e222]: Dynamic runtimes — Python, notebook execution, model-generated scripts, dependency installation — run inside isolated workload environments without ambient host access.
      - generic [ref=e223]:
        - generic [ref=e224]: Multi-tenant platforms
        - heading "Tenant isolation across the stack" [level=3] [ref=e225]
        - paragraph [ref=e226]: Compute, network, storage, secrets, artifacts, and audit are tenant-bound. Cross-tenant communication is denied unless explicitly modeled in policy.
      - generic [ref=e227]:
        - generic [ref=e228]: Workflow runtimes
        - heading "Governed steps, governed artifacts" [level=3] [ref=e229]
        - paragraph [ref=e230]: Workflow nodes, builders, retrieval pipelines, and artifact generators run as decorated execution plans with retention, encryption, and access policy attached to every output.
