      - heading "What MVM enforces, and what it does not depend on." [level=2] [ref=e235]
      - paragraph [ref=e236]: MVM does not depend on perfect model behavior. It constrains the runtime consequences of model-mediated behavior. The backend may change. The execution contract does not.
