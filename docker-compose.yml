services:
  agentzero:
    build: .
    image: agentzero:latest
    ports:
      - "8080:8080"
    volumes:
      - agentzero-data:/data
      # Optional: mount your own config file
      # - ./agentzero.toml:/data/agentzero.toml:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agentzero-data:
