services:
  agentzero:
    build: .
    image: agentzero:latest
    ports:
      - "8080:8080"
    volumes:
      - agentzero-data:/data
      # Optional: mount your own config file
      # - ./agentzero.toml:/data/agentzero.toml:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Set to "production" to enforce TLS + auth validation on startup
      # - AGENTZERO_ENV=production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8080/health || curl -fk https://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  agentzero-data:
